# ============================================================
# PolicyPulse — GitLab CI/CD Pipeline (Shell Executor)
# ============================================================

stages:
  - build
  - scan
  - test
  - deploy

variables:
  DOCKER_HUB_USER: kanyevictor
  WEATHER_APP_IMAGE: ${DOCKER_HUB_USER}/weather-app
  POLICYPULSE_AI_IMAGE: ${DOCKER_HUB_USER}/policypulse-ai
  IMAGE_TAG: v${CI_PIPELINE_IID}

# ──────────────────────────────────────────────
# BUILD
# ──────────────────────────────────────────────

build-weather-app:
  stage: build
  tags:
    - st1-runner
  before_script:
    - echo "${DOCKER_HUB_TOKEN}" | docker login -u "${DOCKER_HUB_USER}" --password-stdin
  script:
    - cd app
    - docker build -t ${WEATHER_APP_IMAGE}:${IMAGE_TAG} .
    - docker push ${WEATHER_APP_IMAGE}:${IMAGE_TAG}

build-policypulse-ai:
  stage: build
  tags:
    - st1-runner
  before_script:
    - echo "${DOCKER_HUB_TOKEN}" | docker login -u "${DOCKER_HUB_USER}" --password-stdin
  script:
    - cd k8s/policypulse-ai
    - docker build -t ${POLICYPULSE_AI_IMAGE}:${IMAGE_TAG} .
    - docker push ${POLICYPULSE_AI_IMAGE}:${IMAGE_TAG}

# ──────────────────────────────────────────────
# SCAN — Trivy
# ──────────────────────────────────────────────

scan-weather-app:
  stage: scan
  tags:
    - st1-runner
  script:
    - trivy image --format table --output weather-app-scan.txt ${WEATHER_APP_IMAGE}:${IMAGE_TAG}
    - trivy image --format json --output weather-app-scan.json ${WEATHER_APP_IMAGE}:${IMAGE_TAG}
    - trivy image --exit-code 1 --severity HIGH,CRITICAL ${WEATHER_APP_IMAGE}:${IMAGE_TAG}
  needs:
    - build-weather-app
  artifacts:
    paths:
      - weather-app-scan.txt
      - weather-app-scan.json
    expire_in: 30 days
    when: always

scan-policypulse-ai:
  stage: scan
  tags:
    - st1-runner
  script:
    - trivy image --format table --output policypulse-ai-scan.txt ${POLICYPULSE_AI_IMAGE}:${IMAGE_TAG}
    - trivy image --format json --output policypulse-ai-scan.json ${POLICYPULSE_AI_IMAGE}:${IMAGE_TAG}
    - trivy image --exit-code 1 --severity HIGH,CRITICAL ${POLICYPULSE_AI_IMAGE}:${IMAGE_TAG}
  needs:
    - build-policypulse-ai
  artifacts:
    paths:
      - policypulse-ai-scan.txt
      - policypulse-ai-scan.json
    expire_in: 30 days
    when: always

scan-k8s-manifests:
  stage: scan
  tags:
    - st1-runner
  script:
    - trivy config --format table --output k8s-manifest-scan.txt ./k8s/ ./manifests/ ./policies/
    - trivy config --format json --output k8s-manifest-scan.json ./k8s/ ./manifests/ ./policies/
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./k8s/ ./manifests/
  artifacts:
    paths:
      - k8s-manifest-scan.txt
      - k8s-manifest-scan.json
    expire_in: 30 days
    when: always

# ──────────────────────────────────────────────
# TEST
# ──────────────────────────────────────────────

test-python-unit:
  stage: test
  tags:
    - st1-runner
  script:
    - cd app
    - pip install -r requirements.txt
    - python3 -m pytest test_app.py -v --tb=short 2>&1 | tee ../unit-test-report.txt
  artifacts:
    paths:
      - unit-test-report.txt
    expire_in: 30 days

test-kyverno-policies:
  stage: test
  tags:
    - st1-runner
  script:
    - echo "=== Testing good manifest ===" | tee kyverno-test-report.txt
    - kyverno apply ./policies/ --resource=./manifests/test-good.yaml 2>&1 | tee -a kyverno-test-report.txt
    - echo "" >> kyverno-test-report.txt
    - echo "=== Testing bad manifest ===" | tee -a kyverno-test-report.txt
    - kyverno apply ./policies/ --resource=./manifests/test-bad.yaml 2>&1 | tee -a kyverno-test-report.txt || true
  artifacts:
    paths:
      - kyverno-test-report.txt
    expire_in: 30 days

# ──────────────────────────────────────────────
# DEPLOY — SSH to Production
# ──────────────────────────────────────────────

deploy:
  stage: deploy
  tags:
    - st1-runner
  script:
    - ssh ${SSH_USER}@${PROD_SERVER_IP} "mkdir -p ~/policypulse/{k8s/elasticsearch,k8s/fluent-bit,k8s/kibana,k8s/policypulse-ai,manifests,policies}"
    - scp -r k8s/namespace.yaml ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/
    - scp -r k8s/elasticsearch/ ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/
    - scp -r k8s/fluent-bit/ ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/
    - scp -r k8s/kibana/ ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/
    - scp k8s/policypulse-ai/policypulse-ai-deployment.yaml ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/policypulse-ai/
    - scp k8s/policy-reporter.yaml ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/k8s/
    - scp manifests/weather-app-deployment.yaml ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/manifests/
    - scp -r policies/ ${SSH_USER}@${PROD_SERVER_IP}:~/policypulse/
    - |
      ssh ${SSH_USER}@${PROD_SERVER_IP} << 'ENDSSH'
        set -e
        kubectl apply -f ~/policypulse/k8s/namespace.yaml
        kubectl apply -f ~/policypulse/policies/
        kubectl apply -f ~/policypulse/k8s/elasticsearch/
        kubectl apply -f ~/policypulse/k8s/fluent-bit/
        kubectl apply -f ~/policypulse/k8s/kibana/
        kubectl apply -f ~/policypulse/k8s/policy-reporter.yaml
        kubectl apply -f ~/policypulse/manifests/weather-app-deployment.yaml
        kubectl apply -f ~/policypulse/k8s/policypulse-ai/policypulse-ai-deployment.yaml
        kubectl rollout status deployment/weather-app -n secure-apps --timeout=120s || true
        kubectl rollout status deployment/policypulse-ai -n logging --timeout=120s || true
        kubectl get pods -A | grep -E "weather-app|policypulse|elasticsearch|kibana|fluent|kyverno"
      ENDSSH
  only:
    - main