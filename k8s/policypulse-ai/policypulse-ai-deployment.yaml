apiVersion: v1
kind: ServiceAccount
metadata:
  name: policypulse-ai
  namespace: ai-report
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: policypulse-ai-reader
rules:
- apiGroups: [""]
  resources: ["pods", "events", "namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list"]
- apiGroups: ["wgpolicyk8s.io"]
  resources: ["policyreports", "clusterpolicyreports"]
  verbs: ["get", "list"]
- apiGroups: ["kyverno.io"]
  resources: ["clusterpolicies", "policies"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: policypulse-ai-binding
subjects:
- kind: ServiceAccount
  name: policypulse-ai
  namespace: ai-report
roleRef:
  kind: ClusterRole
  name: policypulse-ai-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policypulse-ai
  namespace: ai-report
  labels:
    app: policypulse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policypulse-ai
  template:
    metadata:
      labels:
        app: policypulse-ai
    spec:
      serviceAccountName: policypulse-ai
      containers:
      - name: policypulse-ai
        image: kanyevictor/policypulse-ai:v19
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: DEEPSEEK_API_KEY
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          privileged: false
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: policypulse-ai
  namespace: ai-report
spec:
  type: NodePort
  selector:
    app: policypulse-ai
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500