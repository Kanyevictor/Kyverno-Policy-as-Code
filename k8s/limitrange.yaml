apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: secure-apps
spec:
  limits:
  - type: Container
    max:
      cpu: "1"
      memory: 1Gi
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: ai-report
spec:
  limits:
  - type: Container
    max:
      cpu: "2"
      memory: 5Gi
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi