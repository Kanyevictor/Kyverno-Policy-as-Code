apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
      Flush           5
      Log_Level       info
      Daemon          off
      Parsers_File    parsers.conf
      HTTP_Server     On
      HTTP_Listen     0.0.0.0
      HTTP_Port       2020

    # Stage 1: COLLECT — tail all container logs
    [INPUT]
      Name              tail
      Path              /var/log/containers/*.log
      Parser            docker,cri
      Tag               kube.*
      Refresh_Interval  10
      Mem_Buf_Limit     5MB
      Skip_Long_Lines   On

    # Stage 2: ENRICH — add Kubernetes metadata to each log record
    [FILTER]
      Name                kubernetes
      Match               kube.*
      Kube_URL            https://kubernetes.default.svc:443
      Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
      Merge_Log           On
      K8S-Logging.Parser  On
      K8S-Logging.Exclude off

    # Stage 3: FORWARD — send secure-apps logs to Elasticsearch
    [OUTPUT]
      Name              es
      Match             kube.*secure-apps*
      Host              elasticsearch.logging.svc.cluster.local
      Port              9200
      Logstashing.Exclude off

    # Stage 3: FORWARD — send secure-apps logs to Elasticsearch
    [OUTPUT]
      Name              es
      Match             kube.*secure-apps*
      Host              elasticsearch.logging.svc.cluster.local
      Port              9200
      Logstash_Format   On
      Logstash_Prefix   kyverno-logs
      Retry_Limit       3
      Suppress_Format   On
      Logstash_Prefix   kyverno-logs
      Retry_Limit       3
      Suppress_Type_Name On
      Buffer_Size       5MB

    # Stage 4: FORWARD — send kyverno logs to Elasticsearch
    [OUTPUT]
      Name              es
      Match             kube.*kyverno*
      Host              elasticsearch.logging.svc.cluster.local
      Port              9200
      Logstash_Format   On
      Logstash_Prefix   kyverno-logs
      Retry_Limit       3
      Suppress_Type_Name On
      Buffer_Size       5MB

  parsers.conf: |
    [PARSER]
      Name        docker
      Format      json
      Time_Key    time
      Time_Format %Y-%m-%dT%H:%M:%S.%L
      Time_Keep   On