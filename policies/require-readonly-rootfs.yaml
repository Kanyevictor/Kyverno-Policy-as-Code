apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          VIOLATION: Root filesystem must be read-only. FIX: Set
          securityContext.readOnlyRootFilesystem=true. Use
          emptyDir volumes for writable paths.
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true